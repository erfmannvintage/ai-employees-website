<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140" role="img" aria-label="Sidekicc">
  <defs>
    <pattern id="benday" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#FFE066"/>
      <circle cx="2" cy="2" r="1.4" fill="#1A1A2E"/>
    </pattern>
    <pattern id="bendayRed" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#FFFFFF"/>
      <circle cx="2" cy="2" r="1.6" fill="#E63946"/>
    </pattern>
    <filter id="inkDrop" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset in="SourceGraphic" dx="0" dy="0" result="off"/>
      <feFlood flood-color="#1A1A2E"/>
      <feComposite in2="off" operator="in"/>
    </filter>
  </defs>

  <!-- Speech bubble background, benday-yellow fill -->
  <g transform="translate(8,14)">
    <path d="M12 6 H132 Q148 6 148 22 V78 Q148 94 132 94 H44 L20 112 L28 94 H12 Q-4 94 -4 78 V22 Q-4 6 12 6 Z"
          fill="url(#benday)" stroke="#1A1A2E" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <!-- SIDEKICC wordmark -->
  <g font-family="'Archivo Black','Impact','Bebas Neue',sans-serif" font-weight="900" letter-spacing="1.5">
    <!-- Shadow layer (black offset) -->
    <text x="20" y="82" font-size="48" fill="#1A1A2E">SIDEKICC</text>
    <!-- Top layer (pop indigo) -->
    <text x="16" y="78" font-size="48" fill="#4F46E5">SIDEKICC</text>
  </g>

  <!-- Exclamation / action mark on right side -->
  <g transform="translate(310,24)">
    <!-- Starburst -->
    <path d="M50 0 L57 18 L76 14 L63 29 L82 34 L63 39 L76 54 L57 50 L50 68 L43 50 L24 54 L37 39 L18 34 L37 29 L24 14 L43 18 Z"
          fill="url(#bendayRed)" stroke="#1A1A2E" stroke-width="4" stroke-linejoin="round"/>
    <text x="50" y="44" text-anchor="middle" font-family="'Archivo Black',Impact,sans-serif" font-weight="900" font-size="26" fill="#1A1A2E">AI</text>
  </g>
</svg>
