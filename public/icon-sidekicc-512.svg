<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Sidekicc">
  <defs>
    <pattern id="mk-benday" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#FFE066"/>
      <circle cx="6" cy="6" r="4.4" fill="#1A1A2E"/>
    </pattern>
  </defs>
  <!-- Full-bleed backplate for maskable safe area (80% logo in center) -->
  <rect width="512" height="512" fill="#4F46E5"/>
  <!-- Comic-panel plate -->
  <rect x="80" y="80" width="352" height="352" rx="72" ry="72" fill="url(#mk-benday)" stroke="#1A1A2E" stroke-width="18"/>
  <!-- Bold S monogram, double-layer -->
  <g font-family="'Archivo Black','Impact','Bebas Neue',sans-serif" font-weight="900">
    <text x="270" y="340" text-anchor="middle" font-size="290" fill="#1A1A2E">S</text>
    <text x="256" y="326" text-anchor="middle" font-size="290" fill="#4F46E5">S</text>
  </g>
</svg>
