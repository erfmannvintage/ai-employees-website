[build]
  command = "PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium && npm run build:ssg"
  publish = "dist"

[build.environment]
  PLAYWRIGHT_BROWSERS_PATH = "0"
  NODE_VERSION = "22"

# Cache Playwright browsers inside node_modules (which Netlify caches between builds)
# so Chromium isn't re-downloaded every deploy.

# No SPA fallback rewrite — every route is prerendered, so Netlify's Pretty URLs
# handles /pricing -> /pricing/index.html directly. If a route isn't prerendered,
# a 404 is correct (and we'd rather know about it than silently serve the shell).

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=86400"
